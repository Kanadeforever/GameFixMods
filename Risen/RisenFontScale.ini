; RisenFontScale
; 修改 Scale 后重启游戏；

[FontScale]
; 开启/关闭字体缩放功能
Enabled=1
; 字体缩放倍数，1.25 = 放大 25%；修改
Scale=1.5
; 缩放后最小字号（绝对值）
MinAbsHeight=6
; 缩放后最大字号（绝对值）
MaxAbsHeight=96
; 开启/关闭日志记录（1=开启 0=关闭）
LogEnabled=1
; 最多记录前 N 次字体创建（设为 0 关闭详细日志）
LogFirstN=64

; [HeightOverride] 格式：名称=高度:倍数
; 倍数=0 时表示走全局 Scale。未列出的高度也走 Scale。
; 修改示例：
;    原始数据：
;    Detail=14:0
;    放大2.5倍
;    Detail=14:2.5
[HeightOverride]
; 信息（任务详情、道具详情）、字幕、选项、存档详情等；
Detail=14:1.5
; 主菜单、设置、读盘提示、路牌/拾取提示、角色名、制作组名单等；
Menu=16:2.0
; 进游戏按A开始、存档标题等；
StartPrompt=19:0
; 未确认；
UnknowFont=32:0
