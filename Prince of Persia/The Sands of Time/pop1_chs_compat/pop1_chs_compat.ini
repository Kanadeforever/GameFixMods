; 《波斯王子：时之砂》简体中文兼容ASI v8
; 将此文件放入 .\scripts 文件夹中，与 000_pop1_chs_compat.asi 放在一起。

[General]
Enabled=1

[POPData]
; 1 = ASI 提供了一个虚拟的 POPData.BF。磁盘上的 POPData.BF/update\POPData.BF 未被修改。
VirtualizePOPData=1
; 1 = 使用中文POPData.BF，但覆盖以优化后的英文POPData.BF中的Gamepad/IOD_2块。  
; 0 = 使用ASI中内嵌的纯中文POPData.BF。
GamepadOverlay=1

[Paths]
; 1 = 重定向 out.dll 的 GBK .\字库\*.dds 字体路径。
FontRedirect=1
; 仅使用ASCII字符的推荐文件夹，相对于游戏根目录。
FontFolder=HHGC\Fonts

[Compatibility]
; 0 = 关闭
; 1 = 确认全屏链。此设置保留全屏模式。
; 2 = 窗口化虚函数表桥接。与 dxwrapper 窗口模式配合使用。
D3D9Fix=2

[Subtitles]
; 安全字幕缩放 v3/v8。
SubtitlePatch=1
; 4K建议：160-200。原始为100。
SubtitleScalePercent=180
; 原始基线为屏幕高度的83%。越大则越低。
SubtitleYPercent=83
