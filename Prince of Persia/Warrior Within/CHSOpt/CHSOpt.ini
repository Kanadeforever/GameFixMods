; ---------------------------------------------------
; 	          POP2 汉化优化插件 配置
; ---------------------------------------------------
; 本文件与 CHSOpt.asi 放在同一目录 (scripts/) 即可生效。
; 修改后重启游戏，无需重新编译 ASI。
; ---------------------------------------------------

[Font]
; ---- 字体缩放倍率 ----
; 控制中文位图字体的字号大小。
;
;   1.0 = 原始大小 (16px/32px) — 800×600 时代的设计
;   2.0 = 2x — 1080p (1920×1080) 推荐
;   2.5 = 2.5x — 2K (2560×1440) 推荐
;   3.0 = 3x — 4K (3840×2160) 推荐
;
; 范围 1.0 ~ 8.0，超出范围自动回退到 2.0
; 设为 0 也回退到 2.0

Scale=2.0

[General]
; ---- 汉化组信息弹窗 ----
; 加载汉化时汉化组会显示一个信息弹窗 (MessageBoxA)。
; 设为 0 可屏蔽此弹窗。
;
;   1 = 显示 (默认，保持原样)
;   0 = 屏蔽

ShowInfoPopup=1

; ---- 日志输出 ----
; 将 CHSOpt 的运行诊断信息写入 scripts/CHSOpt.log。
; 建议仅在排查问题时开启，日常使用可关闭以减少磁盘写入。
;
;   1 = 开启 (默认)
;   0 = 关闭

Log=0
