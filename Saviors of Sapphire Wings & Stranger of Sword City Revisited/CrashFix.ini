; ============================================================
; CrashFix 配置文件
; 修复 GetRawInputDeviceList 缓冲区溢出崩溃
; 手柄+键盘同时使用不再崩溃
; ============================================================

[InputFix]
; TOCTOU 缓冲区溢出修复 (强烈建议保持启用)
FixTOCTOU=1
; 设备枚举临界区保护 (强烈建议保持启用)
EnableCriticalSection=1
; 调试日志 (用 DebugView 查看 OutputDebugString)
DebugLog=0
